name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/docgen
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build:all
            pnpm db:migrate
            ldconfig -p | grep -q libatk-1.0 || DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libatk1.0-0 libatk-bridge2.0-0 libgbm1 libnss3 libnspr4 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libcups2 libdrm2 libasound2 libx11-xcb1
            pm2 reload ecosystem.config.cjs --update-env
            echo "Deploy selesai: $(date)"
