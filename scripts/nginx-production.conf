# Konfigurasi nginx PRODUKSI DocGen (docgen.razornez.net).
# File ini diterapkan OTOMATIS oleh .github/workflows/deploy.yml ke
# /etc/nginx/sites-available/docgen pada tiap push ke main (dengan nginx -t
# sebagai gerbang + restore backup bila tes gagal). Jangan edit manual di server.
#
# Model routing: SPA dashboard+landing dari ROOT '/'. API Fastify hanya di
# '/v1/' dan '/health'. Path lama '/app/' diarahkan (301) ke root.

server {
    listen 80;
    server_name docgen.razornez.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name docgen.razornez.net;

    ssl_certificate     /etc/letsencrypt/live/docgen.razornez.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docgen.razornez.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    root  /var/www/docgen/apps/dashboard/dist;
    index index.html;

    # --- API Fastify (:3001) — hanya /v1 dan /health ---
    location /v1/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }
    location = /health {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Kompatibilitas: path lama /app/ → root ---
    location = /app { return 301 https://$host/; }
    location /app/  { return 301 https://$host/; }

    # --- Aset ber-hash (immutable) ---
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
